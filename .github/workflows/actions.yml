name: Build, Test, and Deploy to EC2

on:
  push:
    branches:
      - main
jobs:
  # 1. Validation Stage
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          # Runs pytest on the /tests folder
          pytest tests/

  # 2. Packaging Stage (Docker Hub)
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Built from the root Dockerfile
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/churn-prediction:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/churn-prediction:latest

  # 3. Deployment Stage (EC2)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log in on the EC2 instance
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Clean up old versions
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/churn-prediction:latest
            docker stop churn-prediction || true
            docker rm churn-prediction || true
            
            # Run the container
            docker run -d -p 80:8000 --name churn-prediction ${{ secrets.DOCKERHUB_USERNAME }}/churn-prediction:latest
